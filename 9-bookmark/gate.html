<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locked · 9 Bookmark</title>
  <style>
    :root { --green: #00e98a; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: #000; color: #e9f0f4;
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .gate {
      width: min(90vw, 330px);
      padding: 24px 24px 22px;
      border: 1px solid rgba(158, 181, 198, .16);
      border-radius: 16px;
      background: #0b1018;
      box-shadow: 0 24px 64px rgba(0, 0, 0, .55);
      text-align: center;
    }
    .brand { display: flex; align-items: center; justify-content: center; gap: 7px; margin-bottom: 4px; }
    .brand img { width: 22px; height: 22px; border-radius: 6px; }
    .brand span { font-size: 13px; font-weight: 700; letter-spacing: .2px; color: #cdd9e3; }
    .lock-icon { font-size: 26px; margin-top: 12px; }
    h1 { margin: 8px 0 4px; font-size: 16px; font-weight: 700; }
    .site { margin: 0 0 16px; color: #9eb5c6; font-size: 13px; word-break: break-all; }
    .site strong { color: #e9f0f4; }
    input {
      width: 100%; padding: 11px 14px; text-align: center;
      font-size: 15px; letter-spacing: 3px;
      color: #e9f0f4; background: #131c27;
      border: 1px solid rgba(158, 181, 198, .28); border-radius: 10px;
      outline: none; transition: border-color .15s ease;
    }
    input:focus { border-color: var(--green); }
    input::placeholder { letter-spacing: normal; }
    .error { min-height: 16px; margin: 8px 0 0; color: #ff7b91; font-size: 12px; }
    .actions { display: flex; gap: 10px; margin-top: 14px; }
    button {
      flex: 1; padding: 10px 14px; font-size: 13px; font-weight: 600;
      border-radius: 10px; border: 1px solid transparent; cursor: pointer;
    }
    .cancel { background: transparent; border-color: rgba(158, 181, 198, .28); color: #cdd9e3; }
    .cancel:hover { background: rgba(158, 181, 198, .1); }
    .unlock { background: var(--green); color: #04120c; }
    .unlock:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <main class="gate">
    <div class="brand"><img src="logo.png" alt="" /><span>9 Bookmark</span></div>
    <div class="lock-icon">&#128274;</div>
    <h1>This site is locked</h1>
    <p class="site"><strong id="siteName"></strong> is in a locked board.</p>
    <form id="gateForm">
      <input id="pass" type="password" inputmode="numeric" maxlength="6"
             placeholder="Master password" autocomplete="off" aria-label="Master password" />
      <p class="error" id="error" role="alert"></p>
      <div class="actions">
        <button type="button" class="cancel" id="cancel">Cancel</button>
        <button type="submit" class="unlock">Unlock</button>
      </div>
    </form>
  </main>
  <script src="gate.js"></script>
</body>
</html>
